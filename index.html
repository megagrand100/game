<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌌 Cosmic Academy — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ─── CSS Variables ──────────────────────────────────── */
:root {
  --bg: #050714;
  --card: rgba(10, 14, 40, 0.92);
  --border: rgba(255,255,255,0.07);
  --text: #dde6ff;
  --dim: #7b8ab8;
  --c-math: #00d4ff;
  --c-science: #39ff14;
  --c-history: #ff8c00;
  --c-geo: #00ffc8;
  --c-cs: #c77dff;
  --c-eng: #ff006e;
  --c-gk: #ffd700;
  --c-arts: #ff6b6b;
  --active: #00d4ff;
  --success: #39ff14;
  --error: #ff4466;
  --radius: 16px;
  --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
}

/* ─── Reset & Base ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Exo 2', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ─── Starfield Canvas ───────────────────────────────── */
#starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ─── Nebula glow blobs ──────────────────────────────── */
.nebula {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.12;
  pointer-events: none;
  z-index: 0;
  animation: nebula-pulse 8s ease-in-out infinite alternate;
}
.nebula-1 { width: 600px; height: 600px; background: #00d4ff; top: -200px; left: -200px; }
.nebula-2 { width: 500px; height: 500px; background: #c77dff; bottom: -150px; right: -150px; animation-delay: -4s; }
.nebula-3 { width: 400px; height: 400px; background: #ff006e; top: 40%; left: 60%; animation-delay: -2s; }

@keyframes nebula-pulse {
  from { opacity: 0.08; transform: scale(1); }
  to { opacity: 0.18; transform: scale(1.1); }
}

/* ─── Screen System ──────────────────────────────────── */
.screen {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
.screen.active { display: flex; }

/* ─── HOME SCREEN ────────────────────────────────────── */
.home-header {
  text-align: center;
  margin-bottom: 48px;
  margin-top: 40px;
  animation: fade-down 0.8s ease both;
}

@keyframes fade-down {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo-ring {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 3px solid rgba(0,212,255,0.5);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  position: relative;
  box-shadow: 0 0 40px rgba(0,212,255,0.3);
  animation: spin-ring 12s linear infinite;
}
@keyframes spin-ring {
  from { box-shadow: 0 0 40px rgba(0,212,255,0.3); border-color: rgba(0,212,255,0.5); }
  33% { box-shadow: 0 0 40px rgba(199,125,255,0.3); border-color: rgba(199,125,255,0.5); }
  66% { box-shadow: 0 0 40px rgba(255,0,110,0.3); border-color: rgba(255,0,110,0.5); }
  to { box-shadow: 0 0 40px rgba(0,212,255,0.3); border-color: rgba(0,212,255,0.5); }
}
.logo-ring::before, .logo-ring::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 1px dashed rgba(255,255,255,0.2);
}
.logo-ring::before { width: 100px; height: 100px; }
.logo-ring::after { width: 120px; height: 120px; }
.logo-ring span { font-size: 32px; }

.home-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 900;
  background: linear-gradient(135deg, #00d4ff 0%, #c77dff 50%, #ff006e 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.home-sub {
  color: var(--dim);
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 8px;
  font-weight: 300;
}

.choose-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 5px;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 24px;
  animation: fade-up 0.8s ease 0.3s both;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ─── Subject Grid ───────────────────────────────────── */
.subjects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 960px;
  animation: fade-up 0.8s ease 0.5s both;
}

.subject-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(12px);
}

.subject-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--color) 0%, transparent 60%);
  opacity: 0;
  transition: opacity var(--transition);
}
.subject-card::after {
  content: '';
  position: absolute;
  bottom: -2px; left: -2px; right: -2px;
  height: 3px;
  background: var(--color);
  border-radius: 0 0 var(--radius) var(--radius);
  transform: scaleX(0);
  transition: transform var(--transition);
}

.subject-card:hover {
  border-color: var(--color);
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 30px color-mix(in srgb, var(--color) 30%, transparent);
}
.subject-card:hover::before { opacity: 0.08; }
.subject-card:hover::after { transform: scaleX(1); }

.card-icon {
  font-size: 40px;
  margin-bottom: 12px;
  display: block;
  filter: drop-shadow(0 0 12px color-mix(in srgb, var(--color) 60%, transparent));
  transition: transform var(--transition);
}
.subject-card:hover .card-icon { transform: scale(1.15) rotate(-5deg); }

.card-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--color);
  letter-spacing: 1px;
}
.card-desc {
  font-size: 12px;
  color: var(--dim);
  margin-top: 4px;
  line-height: 1.5;
}
.card-count {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--color);
  text-transform: uppercase;
  opacity: 0.8;
}
.card-count::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color);
  animation: blink 2s ease infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ─── QUIZ SCREEN ────────────────────────────────────── */
.quiz-container {
  width: 100%;
  max-width: 720px;
  padding-top: 20px;
}

/* Top bar */
.quiz-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}
.btn-back {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--dim);
  cursor: pointer;
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 13px;
  font-family: 'Exo 2', sans-serif;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
  backdrop-filter: blur(8px);
}
.btn-back:hover { border-color: var(--active); color: var(--active); }

.quiz-subject-badge {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--color, var(--active));
  color: var(--color, var(--active));
  background: color-mix(in srgb, var(--color, var(--active)) 10%, transparent);
}

.quiz-score-display {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--gk, #ffd700);
}
.score-star { font-size: 14px; }

/* Progress */
.progress-wrapper {
  margin-bottom: 20px;
}
.progress-meta {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--dim);
  margin-bottom: 8px;
  font-family: 'Rajdhani', sans-serif;
}
.progress-track {
  height: 4px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--active), var(--color, #c77dff));
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 10px var(--active);
}

/* Timer */
.timer-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}
.timer-bar-track {
  flex: 1; height: 6px;
  background: rgba(255,255,255,0.07);
  border-radius: 3px;
  overflow: hidden;
}
.timer-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s linear, background 1s linear;
  background: var(--success);
}
.timer-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 700;
  min-width: 28px;
  text-align: right;
  transition: color 0.5s;
}

/* Question Card */
.question-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  margin-bottom: 16px;
  backdrop-filter: blur(16px);
  position: relative;
  overflow: hidden;
  animation: card-in 0.5s cubic-bezier(0.4,0,0.2,1) both;
}
.question-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--color, var(--active)), transparent);
  opacity: 0.7;
}

@keyframes card-in {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.q-number {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--color, var(--active));
  margin-bottom: 14px;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.q-number::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color, var(--active));
  opacity: 0.2;
}

.question-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(18px, 3.5vw, 22px);
  font-weight: 600;
  line-height: 1.55;
  color: #eef2ff;
}

/* Streak */
.streak-badge {
  position: absolute;
  top: 20px; right: 20px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Rajdhani', sans-serif;
  background: rgba(255,140,0,0.15);
  border: 1px solid rgba(255,140,0,0.3);
  border-radius: 20px;
  padding: 4px 10px;
  color: #ff8c00;
  display: none;
}
.streak-badge.visible { display: block; animation: bounce 0.4s ease; }
@keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }

/* Hint Box */
.hint-section { margin-bottom: 12px; }
.btn-hint {
  background: transparent;
  border: 1px dashed rgba(255,212,0,0.4);
  color: rgba(255,212,0,0.8);
  border-radius: 10px;
  padding: 9px 18px;
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.btn-hint:hover { background: rgba(255,212,0,0.08); border-color: rgba(255,212,0,0.7); }
.hint-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, opacity 0.4s ease;
  opacity: 0;
}
.hint-content.open { max-height: 200px; opacity: 1; }
.hint-box {
  background: rgba(255,212,0,0.05);
  border: 1px solid rgba(255,212,0,0.2);
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 10px;
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 14px;
  color: #ffe08a;
  line-height: 1.5;
}
.hint-box .hi { font-size: 18px; flex-shrink: 0; margin-top: -1px; }

/* Options Grid */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
@media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }

.option-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 16px 18px;
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  display: flex; align-items: center; gap: 12px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
  line-height: 1.4;
}
.option-btn::before {
  content: attr(data-letter);
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; flex-shrink: 0;
  border-radius: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--dim);
  transition: all var(--transition);
}
.option-btn:hover:not(:disabled) {
  border-color: var(--color, var(--active));
  background: color-mix(in srgb, var(--color, var(--active)) 8%, transparent);
  transform: translateX(4px);
}
.option-btn:hover:not(:disabled)::before {
  background: var(--color, var(--active));
  color: #000;
  border-color: transparent;
}

.option-btn.correct {
  border-color: var(--success);
  background: rgba(57,255,20,0.1);
  color: #39ff14;
}
.option-btn.correct::before { background: var(--success); color: #000; border-color: transparent; }
.option-btn.wrong {
  border-color: var(--error);
  background: rgba(255,68,102,0.1);
  color: #ff8fa3;
}
.option-btn.wrong::before { background: var(--error); color: #fff; border-color: transparent; }
.option-btn:disabled { cursor: not-allowed; opacity: 0.7; transform: none !important; }

.option-icon {
  margin-left: auto; flex-shrink: 0;
  font-size: 18px;
  opacity: 0;
  transition: opacity 0.2s;
}
.option-btn.correct .option-icon,
.option-btn.wrong .option-icon { opacity: 1; }

/* Feedback */
.feedback-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  backdrop-filter: blur(12px);
  max-height: 0;
  transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
  margin-bottom: 16px;
}
.feedback-panel.open { max-height: 600px; }

.feedback-header {
  padding: 14px 20px;
  display: flex; align-items: center; gap: 10px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 17px;
}
.feedback-header.correct { color: var(--success); border-bottom: 1px solid rgba(57,255,20,0.15); background: rgba(57,255,20,0.05); }
.feedback-header.wrong { color: var(--error); border-bottom: 1px solid rgba(255,68,102,0.15); background: rgba(255,68,102,0.05); }

.btn-explain {
  display: flex; align-items: center; gap: 8px;
  margin: 12px 20px;
  background: transparent;
  border: 1px solid rgba(0,212,255,0.3);
  color: var(--active);
  border-radius: 10px;
  padding: 9px 16px;
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  width: fit-content;
}
.btn-explain:hover { background: rgba(0,212,255,0.08); }
.btn-explain .arrow { transition: transform 0.3s; }
.btn-explain.open .arrow { transform: rotate(180deg); }

.explanation-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease;
}
.explanation-body.open { max-height: 400px; }
.explanation-text {
  margin: 0 20px 20px;
  padding: 14px 16px;
  background: rgba(0,212,255,0.05);
  border-left: 3px solid var(--active);
  border-radius: 0 10px 10px 0;
  font-size: 14px;
  line-height: 1.7;
  color: #c8d8f0;
}

/* Next Button */
.btn-next {
  width: 100%;
  padding: 17px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--color, var(--active)), color-mix(in srgb, var(--color, var(--active)) 70%, #c77dff));
  color: #000;
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--transition);
  display: none;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 30px;
  box-shadow: 0 8px 30px color-mix(in srgb, var(--color, var(--active)) 35%, transparent);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 14px 40px color-mix(in srgb, var(--color, var(--active)) 50%, transparent); }
.btn-next.visible { display: flex; animation: btn-appear 0.4s ease both; }
@keyframes btn-appear { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ─── RESULT SCREEN ──────────────────────────────────── */
.result-container {
  width: 100%;
  max-width: 600px;
  text-align: center;
  padding: 40px 20px 60px;
}

.result-ring {
  width: 180px; height: 180px;
  margin: 0 auto 30px;
  position: relative;
}
.result-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.result-ring .track { stroke: rgba(255,255,255,0.07); }
.result-ring .fill { stroke-dasharray: 502; stroke-dashoffset: 502; transition: stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1) 0.3s; }
.result-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.result-score-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 44px; font-weight: 900;
  line-height: 1;
}
.result-score-lbl {
  font-size: 12px; color: var(--dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}

.result-grade {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.result-message {
  font-size: 15px;
  color: var(--dim);
  margin-bottom: 32px;
  line-height: 1.6;
}

.result-stats {
  display: flex; justify-content: center; gap: 16px;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.stat-pill {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 20px;
  backdrop-filter: blur(8px);
  display: flex; align-items: center; gap: 8px;
}
.stat-pill .sp-icon { font-size: 18px; }
.stat-pill .sp-val {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; font-size: 18px;
}
.stat-pill .sp-key { font-size: 12px; color: var(--dim); }

.result-actions { display: flex; flex-direction: column; gap: 12px; align-items: center; }
.btn-restart, .btn-home-result {
  padding: 14px 40px;
  border-radius: 12px;
  border: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 17px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: all 0.25s;
}
.btn-restart {
  background: linear-gradient(135deg, var(--active), #c77dff);
  color: #000;
  box-shadow: 0 8px 30px rgba(0,212,255,0.3);
}
.btn-restart:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(0,212,255,0.45); }
.btn-home-result {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--dim);
  backdrop-filter: blur(8px);
}
.btn-home-result:hover { border-color: var(--active); color: var(--active); }

/* ─── Confetti particle ──────────────────────────────── */
.confetti-piece {
  position: fixed;
  width: 8px; height: 8px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 999;
  animation: confetti-fall linear forwards;
}
@keyframes confetti-fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ─── Scrollbar ──────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

/* ─── Utility ────────────────────────────────────────── */
.glow-text { text-shadow: 0 0 20px currentColor; }
</style>
</head>
<body>

<div class="screen" id="quiz-screen">

      </div>
    </div>

      </div>

        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="timer-row">

      </div>

      <div class="q-number" id="q-number">QUESTION 01</div>
      <div class="question-text" id="question-text"></div>
    </div>

    <div class="hint-section">
      <button class="btn-hint" id="hint-btn" onclick="toggleHint()">
        💡 Need a Hint?
      </button>
      <div class="hint-content" id="hint-content">
        <div class="hint-box">
          <span class="hi">💡</span>
          <span id="hint-text"></span>
        </div>
      </div>
    </div>

    <!-- Options -->
    <div class="options-grid" id="options-grid"></div>

    <!-- Feedback -->
    <div class="feedback-panel" id="feedback-panel">
      <div class="feedback-header" id="feedback-header"></div>
      <button class="btn-explain" id="explain-btn" onclick="toggleExplanation()">
        <span>📖 See Explanation</span>
        <span class="arrow">▼</span>
      </button>
      <div class="explanation-body" id="explanation-body">
        <div class="explanation-text" id="explanation-text"></div>
      </div>
    </div>

    <!-- Next -->
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">
      Next Question →
    </button>

  </div>
</div>

    </div>
  </div>
</div>

      { q: "Which Shakespeare play features 'Shylock'?", o: ["Othello","Hamlet","The Merchant of Venice","Macbeth"], a: "The Merchant of Venice", hint: "Shylock is a moneylender demanding a 'pound of flesh'", explanation: "Shylock appears in 'The Merchant of Venice' (~1596-1599). The famous 'Hath not a Jew eyes?' speech is his — one of Shakespeare's most complex characters." },

      { q: "Homer's 'The Iliad' is primarily about which war?", o: ["Persian War","Peloponnesian War","Trojan War","Macedonian War"], a: "Trojan War", hint: "Involves a famous wooden horse and the city of Troy", explanation: "The Iliad (~8th century BCE) narrates the siege of Troy. Focuses on Achilles' anger. The Odyssey is the sequel. The Trojan Horse actually appears in Virgil's Aeneid!" },

    ]
  }
};

/* ─── Starfield ───────────────────────────────────────── */
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length: 180}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.3,
      alpha: Math.random() * 0.7 + 0.2,
      speed: Math.random() * 0.3 + 0.05,
      phase: Math.random() * Math.PI * 2
    }));
  }
  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.phase += s.speed * 0.015;
      const a = s.alpha * (0.6 + 0.4 * Math.sin(s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();
  requestAnimationFrame(draw);
  window.addEventListener('resize', resize);
})();

/* ─── Subject Grid Build ──────────────────────────────── */
(function buildSubjects() {
  const grid = document.getElementById('subjects-grid');
  Object.keys(QUIZ_DATA).forEach((key, i) => {
    const sub = QUIZ_DATA[key];
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.style.cssText = `--color: ${sub.color}; animation: fade-up 0.6s ease ${0.1 + i*0.07}s both;`;
    card.innerHTML = `
      <span class="card-icon">${sub.icon}</span>
      <div class="card-name">${sub.name}</div>
      <div class="card-desc">${sub.desc}</div>
      <div class="card-count">${sub.questions.length} Questions</div>
    `;
    card.onclick = () => startQuiz(key);
    grid.appendChild(card);
  });
})();

/* ─── Quiz State ──────────────────────────────────────── */
let state = {
  subjectKey: null,
  questions: [],
  currentIdx: 0,
  score: 0,
  streak: 0,
  bestStreak: 0,
  answered: false,
  timer: null,
  timeLeft: 30,
  timeTotal: 30,
  timings: [],
  hintOpen: false,
  explainOpen: false,
  correct: 0,
  wrong: 0
};

const LETTERS = ['A','B','C','D'];

/* ─── Start Quiz ──────────────────────────────────────── */
function startQuiz(key) {
  const sub = QUIZ_DATA[key];
  state = {
    subjectKey: key,
    questions: [...sub.questions].sort(() => Math.random() - 0.5),
    currentIdx: 0,
    score: 0,
    streak: 0,
    bestStreak: 0,
    answered: false,
    timer: null,
    timeLeft: 30,
    timeTotal: 30,
    timings: [],
    hintOpen: false,
    explainOpen: false,
    correct: 0,
    wrong: 0
  };

  // Apply subject color to quiz screen
  document.getElementById('quiz-screen').style.setProperty('--color', sub.color);
  document.getElementById('progress-fill').style.setProperty('--color', sub.color);
  document.getElementById('btn-next').style.setProperty('--color', sub.color);
  document.getElementById('quiz-badge').textContent = `${sub.icon} ${sub.name}`;
  document.getElementById('quiz-badge').style.setProperty('--color', sub.color);

  showScreen('quiz-screen');
  loadQuestion();
}

/* ─── Load Question ───────────────────────────────────── */
function loadQuestion() {
  const q = state.questions[state.currentIdx];
  state.answered = false;
  state.hintOpen = false;
  state.explainOpen = false;
  state.timeLeft = state.timeTotal;

  // Animate card
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'card-in 0.5s cubic-bezier(0.4,0,0.2,1) both';

  // Question
  document.getElementById('q-number').textContent = `QUESTION ${String(state.currentIdx+1).padStart(2,'0')}`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('hint-text').textContent = q.hint;
  document.getElementById('score-val').textContent = state.score;

  // Hint reset
  document.getElementById('hint-content').classList.remove('open');
  document.getElementById('hint-btn').innerHTML = '💡 Need a Hint?';
  document.getElementById('hint-btn').disabled = false;

  // Progress
  const pct = (state.currentIdx / state.questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `Question ${state.currentIdx+1} of ${state.questions.length}`;
  document.getElementById('streak-info').textContent = state.streak > 1 ? `🔥 ${state.streak} streak` : '';

  // Streak badge
  const badge = document.getElementById('streak-badge');
  if (state.streak >= 3) {
    badge.textContent = `🔥 ${state.streak}x Streak!`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }

  // Options
  const opts = document.getElementById('options-grid');
  opts.innerHTML = '';
  const shuffled = [...q.o].sort(() => Math.random() - 0.5);
  shuffled.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.setAttribute('data-letter', LETTERS[i]);
    btn.innerHTML = `<span>${opt}</span><span class="option-icon"></span>`;
    btn.onclick = () => selectAnswer(opt, btn, q.a, q.explanation);
    opts.appendChild(btn);
  });

  // Feedback reset
  const fp = document.getElementById('feedback-panel');
  fp.classList.remove('open');
  document.getElementById('feedback-header').innerHTML = '';
  document.getElementById('explanation-body').classList.remove('open');
  document.getElementById('explain-btn').classList.remove('open');

  // Next btn
  const nxt = document.getElementById('btn-next');
  nxt.classList.remove('visible');
  nxt.textContent = state.currentIdx < state.questions.length - 1
    ? 'Next Question →'
    : '🏁 See Results';

  // Timer
  startTimer();
}

/* ─── Timer ───────────────────────────────────────────── */
function startTimer() {
  clearInterval(state.timer);
  updateTimerUI();
  state.timer = setInterval(() => {
    state.timeLeft--;
    updateTimerUI();
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      if (!state.answered) autoFail();
    }
  }, 1000);
}

function updateTimerUI() {
  const pct = (state.timeLeft / state.timeTotal) * 100;
  const bar = document.getElementById('timer-bar');
  const lbl = document.getElementById('timer-label');
  bar.style.width = pct + '%';
  const color = pct > 50 ? '#39ff14' : pct > 25 ? '#ffd700' : '#ff4466';
  bar.style.background = color;
  lbl.style.color = color;
  lbl.textContent = state.timeLeft;
}

function autoFail() {
  state.answered = true;
  state.timings.push(0);
  state.streak = 0;
  state.wrong++;
  const q = state.questions[state.currentIdx];
  // Mark correct option
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.disabled = true;
    const text = btn.querySelector('span').textContent;
    if (text === q.a) {
      btn.classList.add('correct');
      btn.querySelector('.option-icon').textContent = '✓';
    }
  });
  showFeedback(false, q.explanation);
}

/* ─── Select Answer ───────────────────────────────────── */
function selectAnswer(selected, btn, correct, explanation) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timer);
  const timeUsed = state.timeTotal - state.timeLeft;
  state.timings.push(timeUsed);

  const isCorrect = selected === correct;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    const text = b.querySelector('span').textContent;
    if (text === correct) {
      b.classList.add('correct');
      b.querySelector('.option-icon').textContent = '✓';
    }
  });

  if (isCorrect) {
    btn.classList.add('correct');
    state.streak++;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    const bonus = Math.min(state.streak - 1, 3);
    const pts = 10 + (bonus * 5) + Math.floor(state.timeLeft * 0.5);
    state.score += pts;
    state.correct++;
    document.getElementById('score-val').textContent = state.score;
    if (state.streak >= 2) pulseScore();
  } else {
    btn.classList.add('wrong');
    btn.querySelector('.option-icon').textContent = '✗';
    state.streak = 0;
    state.wrong++;
  }

  showFeedback(isCorrect, explanation);
}

function pulseScore() {
  const el = document.getElementById('score-val');
  el.style.transform = 'scale(1.4)';
  el.style.transition = 'transform 0.2s';
  setTimeout(() => { el.style.transform = 'scale(1)'; }, 200);
}

/* ─── Feedback ────────────────────────────────────────── */
function showFeedback(isCorrect, explanation) {
  const panel = document.getElementById('feedback-panel');
  const header = document.getElementById('feedback-header');
  document.getElementById('explanation-text').textContent = explanation;

  if (isCorrect) {
    header.className = 'feedback-header correct';
    header.innerHTML = `<span>✅</span> ${state.streak >= 3 ? '🔥 BLAZING! +' + (10 + Math.min(state.streak-1,3)*5) + ' pts' : 'Correct! Well done!'}`;
  } else {
    header.className = 'feedback-header wrong';
    header.innerHTML = `<span>❌</span> Incorrect — check the explanation!`;
  }

  panel.classList.add('open');
  document.getElementById('btn-next').classList.add('visible');
}

/* ─── Toggle Hint ─────────────────────────────────────── */
function toggleHint() {
  if (state.answered) return;
  state.hintOpen = !state.hintOpen;
  document.getElementById('hint-content').classList.toggle('open', state.hintOpen);
  document.getElementById('hint-btn').innerHTML = state.hintOpen ? '💡 Hide Hint' : '💡 Need a Hint?';
}

/* ─── Toggle Explanation ──────────────────────────────── */
function toggleExplanation() {
  state.explainOpen = !state.explainOpen;
  document.getElementById('explanation-body').classList.toggle('open', state.explainOpen);
  document.getElementById('explain-btn').classList.toggle('open', state.explainOpen);
  document.getElementById('explain-btn').querySelector('span:first-child').textContent =
    state.explainOpen ? '📖 Hide Explanation' : '📖 See Explanation';
}

/* ─── Next Question ───────────────────────────────────── */
function nextQuestion() {
  state.currentIdx++;
  if (state.currentIdx >= state.questions.length) {
    showResults();
  } else {
    loadQuestion();
  }
}

/* ─── Results ─────────────────────────────────────────── */
function showResults() {
  const sub = QUIZ_DATA[state.subjectKey];
  const total = state.questions.length;
  const maxScore = total * 20;
  const pct = Math.min(100, Math.round((state.score / maxScore) * 100));
  const avgTime = state.timings.length
    ? Math.round(state.timings.reduce((a,b)=>a+b,0) / state.timings.length)
    : 0;

  document.getElementById('stat-correct').textContent = state.correct;
  document.getElementById('stat-wrong').textContent = state.wrong;
  document.getElementById('stat-streak').textContent = state.bestStreak;
  document.getElementById('stat-time').textContent = avgTime + 's';

  const color = pct >= 80 ? '#39ff14' : pct >= 50 ? '#ffd700' : '#ff4466';
  document.getElementById('result-num').style.color = color;
  document.getElementById('result-num').textContent = state.score;
  document.getElementById('result-ring-fill').style.stroke = color;

  let grade, msg;
  if (pct >= 90) { grade = '🏆 LEGENDARY'; msg = `Absolutely stellar! You dominated ${sub.name} like a true master.`; }
  else if (pct >= 75) { grade = '⭐ BRILLIANT'; msg = `Outstanding performance! Your knowledge is impressive.`; }
  else if (pct >= 60) { grade = '💡 SMART'; msg = `Good job! You clearly know your stuff. A little revision and you'll be legendary.`; }
  else if (pct >= 40) { grade = '📚 KEEP GOING'; msg = `You're getting there! Review the explanations and try again.`; }
  else { grade = '🌱 BEGINNER'; msg = `Don't give up — every expert was once a beginner. Review and retry!`; }

  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-grade').style.color = color;
  document.getElementById('result-msg').textContent = msg;

  showScreen('result-screen');

  // Animate ring
  setTimeout(() => {
    const circumference = 2 * Math.PI * 70; // r=70
    const dashOffset = circumference - (pct / 100) * circumference;
    document.getElementById('result-ring-fill').style.strokeDashoffset = dashOffset;
  }, 100);

  // Animate number
  animateNumber(document.getElementById('result-num'), 0, state.score, 1400);

  if (pct >= 70) launchConfetti(color);
}

function animateNumber(el, from, to, duration) {
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    el.textContent = Math.round(from + (to - from) * easeOut(p));
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

/* ─── Confetti ────────────────────────────────────────── */
function launchConfetti(mainColor) {
  const colors = [mainColor, '#00d4ff', '#ffd700', '#ff006e', '#39ff14', '#c77dff'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -20px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${Math.random() * 8 + 5}px;
      height: ${Math.random() * 8 + 5}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${Math.random() * 2 + 2}s;
      animation-delay: ${Math.random() * 1.5}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

/* ─── Navigation ──────────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  clearInterval(state.timer);
  showScreen('home-screen');
}

function restartQuiz() {
  startQuiz(state.subjectKey);
}
